<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  input::placeholder { color: #9AA1AD; }
</style>
</helmet>

<div style="position: relative; min-height: 100vh; width: 100%; overflow: hidden; background: radial-gradient(130% 130% at 12% -5%, #7C3AED 0%, #5B4BE0 36%, #1E3A8A 68%, #0F766E 100%); display: flex; align-items: center; justify-content: center; padding: 48px;">

  <!-- Decorative rings & glow -->
  <div style="position: absolute; left: -180px; bottom: -220px; width: 640px; height: 640px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.09); pointer-events: none;"></div>
  <div style="position: absolute; left: -60px; bottom: -100px; width: 420px; height: 420px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.09); pointer-events: none;"></div>
  <div style="position: absolute; right: -160px; top: -160px; width: 560px; height: 560px; border-radius: 50%; background: radial-gradient(circle, rgba(20,184,166,0.38), transparent 70%); pointer-events: none;"></div>

  <!-- Content row -->
  <div style="position: relative; z-index: 2; width: 100%; max-width: 1120px; display: flex; align-items: center; justify-content: space-between; gap: 72px;">

    <!-- Brand messaging -->
    <div style="flex: 1; min-width: 0; max-width: 480px;">
      <div style="font-size: 15px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.82); margin-bottom: 28px;">Ollo Inspect</div>
      <div style="font-size: 52px; line-height: 1.1; font-weight: 800; color: #fff; letter-spacing: -0.025em; text-wrap: balance;">The health check platform for modern workshops.</div>
      <div style="margin-top: 22px; font-size: 18px; line-height: 1.55; color: rgba(255,255,255,0.82); max-width: 420px;">Digital vehicle health checks your customers trust and your workshop runs on.</div>

      <div style="margin-top: 40px; display: flex; align-items: center; gap: 26px; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 9px;">
          <span style="width: 10px; height: 10px; border-radius: 50%; background: #34D399; box-shadow: 0 0 0 4px rgba(52,211,153,0.22);"></span>
          <span style="font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9);">Live authorisations</span>
        </div>
        <div style="display: flex; align-items: center; gap: 9px;">
          <span style="width: 10px; height: 10px; border-radius: 50%; background: #FBBF24; box-shadow: 0 0 0 4px rgba(251,191,36,0.22);"></span>
          <span style="font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9);">Traffic-light reports</span>
        </div>
      </div>
    </div>

    <!-- Card -->
    <div style="flex-shrink: 0; width: 440px; background: rgba(255,255,255,0.99); border-radius: 22px; padding: 44px 44px 40px; box-shadow: 0 40px 80px -24px rgba(10,4,40,0.55), 0 0 0 1px rgba(255,255,255,0.4);">
      <img src="assets/ollo-logo.png" alt="Ollo Inspect" style="height: 38px; width: auto; display: block; margin: 0 auto 26px;">
      <div style="font-size: 24px; font-weight: 800; color: #171A21; text-align: center; letter-spacing: -0.01em;">Sign in to your account</div>
      <div style="font-size: 15px; color: #6A7180; text-align: center; margin-top: 6px; margin-bottom: 28px;">Welcome back &mdash; let's get to work.</div>

      <label style="font-size: 13px; font-weight: 600; color: #3A404B; margin-bottom: 7px; display: block;">Email address</label>
      <input type="email" placeholder="you@workshop.co.uk" style="width: 100%; height: 50px; border: 1.5px solid #E2E5EA; background: #F7F8FA; border-radius: 12px; padding: 0 16px; font-family: inherit; font-size: 15px; color: #171A21; outline: none; margin-bottom: 16px;" style-focus="border-color: #7C3AED; background: #fff; box-shadow: 0 0 0 4px rgba(124,58,237,0.13);">

      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px;">
        <label style="font-size: 13px; font-weight: 600; color: #3A404B;">Password</label>
        <a href="#" style="font-size: 13px; font-weight: 600; color: #7C3AED; text-decoration: none;">Forgot?</a>
      </div>
      <input type="password" placeholder="Enter your password" style="width: 100%; height: 50px; border: 1.5px solid #E2E5EA; background: #F7F8FA; border-radius: 12px; padding: 0 16px; font-family: inherit; font-size: 15px; color: #171A21; outline: none; margin-bottom: 24px;" style-focus="border-color: #7C3AED; background: #fff; box-shadow: 0 0 0 4px rgba(124,58,237,0.13);">

      <button style="width: 100%; height: 52px; border: none; background: linear-gradient(100deg, #7C3AED, #4F46E5 55%, #14B8A6); color: #fff; border-radius: 12px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 14px 28px -8px rgba(79,70,229,0.55);" style-hover="filter: brightness(1.06);">Sign in</button>

      <div style="display: flex; align-items: center; gap: 14px; margin: 22px 0;">
        <div style="height: 1px; flex: 1; background: #E6E8EC;"></div>
        <span style="font-size: 12px; font-weight: 600; color: #9AA1AD;">or</span>
        <div style="height: 1px; flex: 1; background: #E6E8EC;"></div>
      </div>

      <button style="width: 100%; height: 50px; border: 1.5px solid #E2E5EA; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: inherit; font-size: 15px; font-weight: 600; color: #2A2F3A; cursor: pointer;" style-hover="background: #F7F8FA;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        Continue with Google
      </button>

      <div style="margin-top: 24px; font-size: 15px; color: #6A7180; text-align: center;">No account yet? <a href="#" style="color: #7C3AED; font-weight: 700; text-decoration: none;">Create one</a></div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
